set -g status-position top

set -g status-left " [%d/%m/%Y]  |  %H:%M"
set -g status-left-length 25
set -g status-right "[#(acpi | grep -o '[^ ]*%%')  |  #(cat /sys/class/power_supply/BAT0/status)] "

set -g window-status-format ""
set -g window-status-current-format ""

set -g xterm-keys on
set -g extended-keys on

unbind C-b
set -g prefix C-a
#bind C-a send-prefix

bind -n C-k split-window -h
bind -n C-j split-window -v

bind -n M-v paste-buffer


bind -n M-t resize-pane -L 5
bind -n M-y resize-pane -R 5
bind -n C-M-t resize-pane -U 5
bind -n C-M-y resize-pane -D 5

bind -n C-p select-pane -t:.+

bind -n M-Enter copy-mode
